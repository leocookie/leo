<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>&#25104;&#26524;&#20013;&#26399; PDF &#22312;&#32447;&#26597;&#30475;</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">PDF &#22312;&#32447;&#39044;&#35272;</p>
        <h1>&#25104;&#26524;&#20013;&#26399;</h1>
      </div>
      <a class="download-button" href="./assets/chengguo-zhongqi.pdf" download="&#25104;&#26524;&#20013;&#26399;.pdf" aria-label="&#19979;&#36733;&#25104;&#26524;&#20013;&#26399; PDF">
        &#19979;&#36733; PDF
      </a>
    </header>

    <main class="viewer-shell">
      <section class="status" id="status" aria-live="polite">&#27491;&#22312;&#21152;&#36733; PDF...</section>

      <section class="pdf-frame" aria-label="PDF &#22312;&#32447;&#39044;&#35272;">
        <object id="pdfObject" type="application/pdf">
          <iframe id="pdfFrame" title="&#25104;&#26524;&#20013;&#26399; PDF"></iframe>
        </object>
      </section>

      <section class="fallback">
        <p>&#22914;&#26524;&#39044;&#35272;&#21306;&#22495;&#26410;&#26174;&#31034;&#65292;&#21487;&#20197;&#30452;&#25509;&#25171;&#24320;&#25110;&#19979;&#36733;&#21407; PDF&#12290;</p>
        <div class="fallback-actions">
          <a href="./assets/chengguo-zhongqi.pdf" target="_blank" rel="noopener">&#25171;&#24320; PDF</a>
          <a href="./assets/chengguo-zhongqi.pdf" download="&#25104;&#26524;&#20013;&#26399;.pdf">&#19979;&#36733; PDF</a>
        </div>
      </section>
    </main>
  <script>
    const pdfBase64Url = "./assets/chengguo-zhongqi.base64.txt";
    const statusEl = document.querySelector("#status");
    const downloadLinks = document.querySelectorAll("a[download]");
    const pdfObject = document.querySelector("#pdfObject");
    const pdfFrame = document.querySelector("#pdfFrame");

    function base64ToBlob(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return new Blob([bytes], { type: "application/pdf" });
    }

    async function loadPdf() {
      try {
        const response = await fetch(pdfBase64Url);
        if (!response.ok) {
          throw new Error("PDF file request failed");
        }

        const base64 = (await response.text()).trim();
        const pdfUrl = URL.createObjectURL(base64ToBlob(base64));
        pdfObject.data = `${pdfUrl}#toolbar=1&navpanes=0&scrollbar=1`;
        pdfFrame.src = pdfObject.data;
        downloadLinks.forEach((link) => {
          link.href = pdfUrl;
          link.download = "\u6210\u679c\u4e2d\u671f.pdf";
        });
        statusEl.textContent = "PDF \u5df2\u52a0\u8f7d\uff0c\u53ef\u5728\u9875\u9762\u4e2d\u9884\u89c8\u6216\u70b9\u51fb\u4e0b\u8f7d\u3002";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "PDF \u52a0\u8f7d\u5931\u8d25\uff0c\u8bf7\u5237\u65b0\u9875\u9762\u6216\u7a0d\u540e\u518d\u8bd5\u3002";
      }
    }

    loadPdf();
  </script>
  </body>
</html>
